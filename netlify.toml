[build]
  command = "npm run build"
  publish = "dist"

# Custom domain settings
[[redirects]]
  from = "https://psa-academy.netlify.app/*"
  to = "https://psa-academy.com/:splat"
  status = 301

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API proxy for Cloudflare
[[redirects]]
  from = "/api/*"
  to = "https://your-backend-domain.com/:splat"
  status = 200
  force = true

# Headers for Cloudflare optimization
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
